services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8086:8085"
    networks:
      - spies-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-staging.rule=Host(`staging.spies.atyourservice-ai.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.backend-staging.entrypoints=websecure"
      - "traefik.http.routers.backend-staging.tls.certresolver=myresolver"
      - "traefik.http.services.backend-staging.loadbalancer.server.port=8085"
      - "traefik.http.middlewares.backend-staging-stripprefix.stripprefix.prefixes=/ws"
      - "traefik.http.routers.backend-staging.middlewares=backend-staging-stripprefix"

  frontend:
    build:
      context: ./stitch-frontend
      dockerfile: Dockerfile
      args:
        - VITE_WS_URL=/ws
    depends_on:
      - backend
    restart: always
    ports:
      - "4174:4173"
    networks:
      - spies-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-staging.rule=Host(`staging.spies.atyourservice-ai.com`)"
      - "traefik.http.routers.frontend-staging.entrypoints=websecure"
      - "traefik.http.routers.frontend-staging.tls.certresolver=myresolver"
      - "traefik.http.services.frontend-staging.loadbalancer.server.port=4173"

networks:
  spies-network:
    external: true
