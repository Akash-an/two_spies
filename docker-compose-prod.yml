services:
  traefik:
    image: traefik:v3.6.1
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@atyourservice-ai.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080" # Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - spies-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - spies-network
    restart: always
    # No direct port exposure in production (use Traefik)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`spies.atyourservice-ai.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=8085"
      - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/ws"
      - "traefik.http.routers.backend.middlewares=backend-stripprefix"

  frontend:
    build:
      context: ./stitch-frontend
      dockerfile: Dockerfile
      args:
        - VITE_WS_URL=/ws
    depends_on:
      - backend
    networks:
      - spies-network
    restart: always
    # No direct port exposure in production (use Traefik)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`spies.atyourservice-ai.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=4173"
networks:
  spies-network:
    name: spies-network
    driver: bridge
