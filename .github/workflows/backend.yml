name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev \
            libssl-dev \
            cmake \
            ninja-build

      - name: Configure
        run: cmake -B backend/build -S backend -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build backend/build --parallel

      - name: Run tests
        run: ctest --test-dir backend/build --output-on-failure
