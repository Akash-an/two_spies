<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; }
  .map-container { position: relative; width: 1280px; height: 720px; }
  .map-img { width: 100%; height: 100%; object-fit: cover; }
  .city { position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
  .label { position: absolute; color: red; font-family: sans-serif; font-size: 14px; font-weight: bold; transform: translate(10px, -10px); }
</style>
</head>
<body>
<div class="map-container">
  <img src="stitch-frontend/public/assets/plain-map.png" class="map-img" />
  <script>
    const cities = {
        "nyc":          [0.27, 0.33],
        "havana":       [0.26, 0.48],
        "buenos_aires": [0.32, 0.76],
        "london":       [0.48, 0.28],
        "berlin":       [0.51, 0.28],
        "moscow":       [0.57, 0.24],
        "cairo":        [0.54, 0.44],
        "tel-aviv":     [0.55, 0.42],
        "dubai":        [0.62, 0.46],
        "bangalore":    [0.69, 0.54],
        "singapore":    [0.77, 0.61],
        "beijing":      [0.82, 0.36],
        "tokyo":        [0.88, 0.36],
        "sydney":       [0.89, 0.80]
    };
    for (const [name, [nx, ny]] of Object.entries(cities)) {
      const x = nx * 1280;
      const y = ny * 720;
      document.write(`<div class="city" style="left: ${x}px; top: ${y}px;"></div>`);
      document.write(`<div class="label" style="left: ${x}px; top: ${y}px;">${name}</div>`);
    }
  </script>
</div>
</body>
</html>
