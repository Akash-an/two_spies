services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8085:8085"
    # Dev-friendly settings can be added here

  frontend:
    build:
      context: ./stitch-frontend
      dockerfile: Dockerfile
      args:
        - VITE_WS_URL=ws://localhost:8085
    depends_on:
      - backend
    restart: always
    ports:
      - "5173:4173"
